<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro — SENA</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <main class="contenedor">
        <div class="tarjeta">
            <h1>Crear Cuenta</h1>
            <p class="subtitulo">Complete el formulario para registrarse</p>

            <form id="formRegistro">
                <div class="campo">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" placeholder="Su nombre completo" required>
                </div>

                <div class="campo">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="campo">
                    <label for="telefono">Teléfono (10 dígitos)</label>
                    <input type="tel" id="telefono" placeholder="3001234567" maxlength="10" required>
                </div>

                <div class="campo">
                    <label for="password">Contraseña (mínimo 6 caracteres)</label>
                    <input type="password" id="password" placeholder="Su contraseña" required>
                </div>

                <button type="submit" class="btn-principal">Registrarse</button>

                <div id="mensaje" class="mensaje"></div>
            </form>

            <p class="enlace">
                ¿Ya tiene una cuenta?
                <a href="index.html">Inicie sesión aquí</a>
            </p>
        </div>
    </main>

    <script src="js/registro.js"></script>
</body>
</html>
